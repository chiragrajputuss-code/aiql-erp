services:
  postgres:
    image: postgres:16-alpine
    container_name: aiql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiql_erp
    ports:
      - "5432:5432"
    volumes:
      - aiql_pgdata:/var/lib/postgresql/data

volumes:
  aiql_pgdata:
