name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build on GitHub → Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup pnpm + Node ────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Type check ───────────────────────────────────────────────────────
      - name: Type check
        run: pnpm --filter web typecheck

      # ── 5. Build on GitHub servers (7GB RAM — no OOM) ─────────────────────
      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm --filter web build

      # ── 6. Setup SSH ─────────────────────────────────────────────────────────
      - name: Setup SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      # ── 7. Rsync built output to EC2 (not the whole repo) ────────────────
      - name: Upload build to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Sync built .next folder
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key.pem" \
            --exclude='.next/cache' \
            apps/web/.next \
            $EC2_USER@$EC2_HOST:~/aiql-erp/apps/web/

          # Sync source files (for prisma + runtime)
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key.pem" \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            . \
            $EC2_USER@$EC2_HOST:~/aiql-erp/

      # ── 8. Install prod deps + migrate + reload on EC2 ───────────────────
      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem $EC2_USER@$EC2_HOST "
            set -e
            cd ~/aiql-erp

            # Install only production deps (no build — already built)
            pnpm install --frozen-lockfile --prod 2>/dev/null || pnpm install --frozen-lockfile

            # Run any new migrations safely
            pnpm --filter @aiql/db exec prisma migrate deploy

            # Zero-downtime reload
            pm2 reload ecosystem.config.js --env production --update-env || \
            pm2 start ecosystem.config.js --env production

            pm2 save
          "

      # ── 9. Health check ───────────────────────────────────────────────────
      - name: Health check
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          sleep 8
          status=$(curl -s -o /dev/null -w "%{http_code}" "$NEXT_PUBLIC_APP_URL/api/health" || echo "000")
          if [[ "$status" != "200" ]]; then
            echo "Health check failed: HTTP $status"
            exit 1
          fi
          echo "✅ Health check passed: HTTP $status"
