# Nginx reverse proxy for AIQL ERP — Next.js on port 3000
# Place at: /etc/nginx/sites-available/aiql
# Enable:   sudo ln -s /etc/nginx/sites-available/aiql /etc/nginx/sites-enabled/aiql
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name app.yourdomain.com;          # ← replace with your domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.yourdomain.com;          # ← replace with your domain

    # SSL — managed by Certbot (Let's Encrypt, free)
    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Max upload size — GL files can be 10-50 MB
    client_max_body_size 100M;

    # Next.js static files — serve directly, long cache
    location /_next/static/ {
        alias /home/ubuntu/aiql-erp/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js app — proxy to Node process
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — LLM responses can take 3-10s
        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;

        proxy_buffer_size      128k;
        proxy_buffers         4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health check — used by EC2 health monitoring
    location /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }

    access_log  /var/log/nginx/aiql-access.log;
    error_log   /var/log/nginx/aiql-error.log;
}
